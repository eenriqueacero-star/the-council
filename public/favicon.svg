<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="33%"  stop-color="#3B82F6"/>
      <stop offset="66%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="sg2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EF4444"/>
      <stop offset="50%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- 6 spokes — one per agent -->
  <line x1="32" y1="6"  x2="32" y2="25" stroke="url(#sg1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="39" x2="32" y2="58" stroke="url(#sg1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="10" y1="19" x2="25" y2="28" stroke="url(#sg1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="39" y1="36" x2="54" y2="45" stroke="url(#sg1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="54" y1="19" x2="39" y2="28" stroke="url(#sg2)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="25" y1="36" x2="10" y2="45" stroke="url(#sg2)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center node -->
  <circle cx="32" cy="32" r="6" fill="url(#sg1)"/>
</svg>
