<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#080808"/>

  <!-- Outermost glow ring -->
  <circle cx="256" cy="256" r="214" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.12"/>

  <!-- Primary seal ring -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="#c9a84c" stroke-width="5.5"/>

  <!-- Inner accent ring -->
  <circle cx="256" cy="256" r="194" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.32"/>

  <!-- Cardinal point diamonds (seated on the primary ring at N/S/E/W) -->
  <!-- North (256, 50) -->
  <polygon points="256,41 265,50 256,59 247,50" fill="#c9a84c"/>
  <!-- South (256, 462) -->
  <polygon points="256,453 265,462 256,471 247,462" fill="#c9a84c"/>
  <!-- East (462, 256) -->
  <polygon points="453,256 462,247 471,256 462,265" fill="#c9a84c"/>
  <!-- West (50, 256) -->
  <polygon points="41,256 50,247 59,256 50,265" fill="#c9a84c"/>

  <!-- Ordinal tick marks at 45° (NE/SE/SW/NW) — small dash tangent to ring -->
  <!-- NE: (256+206·cos45°, 256-206·sin45°) ≈ (401,111) -->
  <line x1="394" y1="104" x2="408" y2="118" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- SE: (401,401) -->
  <line x1="394" y1="408" x2="408" y2="394" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- SW: (111,401) -->
  <line x1="104" y1="394" x2="118" y2="408" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- NW: (111,111) -->
  <line x1="118" y1="104" x2="104" y2="118" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- ════════════  S W O R D  ════════════ -->

  <!-- Blade glow (slightly wider, very faint — creates ambient luminance) -->
  <path d="M256,108 L278,312 L234,312 Z" fill="#c9a84c" opacity="0.08"/>

  <!-- Blade body (double-edged triangle, tip up) -->
  <path d="M256,108 L270,312 L242,312 Z" fill="#c9a84c"/>

  <!-- Fuller — center groove highlight -->
  <line x1="256" y1="120" x2="256" y2="308"
        stroke="#f5ecc8" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>

  <!-- Bevel edge details — thin lines along each edge of the blade -->
  <line x1="256" y1="108" x2="242" y2="312"
        stroke="#916820" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="256" y1="108" x2="270" y2="312"
        stroke="#916820" stroke-width="1" stroke-linecap="round" opacity="0.45"/>

  <!-- Crossguard -->
  <rect x="206" y="309" width="100" height="17" rx="8.5" fill="#c9a84c"/>
  <!-- Crossguard top-edge highlight -->
  <rect x="206" y="309" width="100" height="6"  rx="3"   fill="#e8c97a" opacity="0.40"/>
  <!-- Crossguard end caps -->
  <circle cx="206" cy="317.5" r="8.5" fill="#c9a84c"/>
  <circle cx="306" cy="317.5" r="8.5" fill="#c9a84c"/>

  <!-- Grip / handle -->
  <rect x="249" y="326" width="14" height="46" rx="7" fill="#c9a84c"/>
  <!-- Grip wrapping bands -->
  <rect x="248" y="334" width="16" height="3" rx="1.5" fill="#0a0800" opacity="0.38"/>
  <rect x="248" y="343" width="16" height="3" rx="1.5" fill="#0a0800" opacity="0.38"/>
  <rect x="248" y="352" width="16" height="3" rx="1.5" fill="#0a0800" opacity="0.38"/>
  <rect x="248" y="361" width="16" height="3" rx="1.5" fill="#0a0800" opacity="0.38"/>

  <!-- Pommel -->
  <circle cx="256" cy="388" r="22"   fill="#c9a84c"/>
  <circle cx="256" cy="388" r="14.5" fill="#d4ad52"/>
  <!-- Pommel facet highlight -->
  <ellipse cx="251" cy="383" rx="6" ry="4.5" fill="#f0e090" opacity="0.50"/>

</svg>
